<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 420" preserveAspectRatio="xMidYMid meet" role="img" aria-label="CLI versus MCP">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#010409"/>
    </linearGradient>
    <pattern id="dots" x="0" y="0" width="32" height="32" patternUnits="userSpaceOnUse">
      <circle cx="16" cy="16" r="1" fill="#30363d" opacity="0.6"/>
    </pattern>
  </defs>

  <rect width="1200" height="420" fill="url(#bg)"/>
  <rect width="1200" height="420" fill="url(#dots)"/>

  <!-- CLI card: terminal -->
  <g transform="translate(100, 90)">
    <rect x="0" y="0" width="380" height="230" rx="14" fill="#161b22" stroke="#238636" stroke-width="2"/>
    <rect x="0" y="0" width="380" height="36" rx="14" fill="#21262d"/>
    <rect x="0" y="22" width="380" height="14" fill="#21262d"/>
    <circle cx="22" cy="18" r="6" fill="#ff5f57"/>
    <circle cx="44" cy="18" r="6" fill="#ffbd2e"/>
    <circle cx="66" cy="18" r="6" fill="#28c940"/>

    <g font-family="Menlo, Consolas, 'Courier New', monospace" font-size="17">
      <text x="24" y="78"><tspan fill="#7ee787">$</tspan> <tspan fill="#c9d1d9">graph-cli mail list</tspan></text>
      <text x="40" y="102" fill="#8b949e">--top 50 --folder Inbox</text>
      <text x="24" y="138"><tspan fill="#7ee787">|</tspan> <tspan fill="#c9d1d9">jq 'map(select(...))'</tspan></text>
      <text x="24" y="174"><tspan fill="#7ee787">$</tspan> <tspan fill="#c9d1d9">_</tspan></text>
      <text x="24" y="204" fill="#6e7681" font-size="13">shell-composable · one process per call</text>
    </g>
  </g>
  <text x="290" y="370" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif" font-size="26" font-weight="700" fill="#e6edf3" text-anchor="middle" letter-spacing="2">CLI</text>

  <!-- VS -->
  <g transform="translate(600, 210)">
    <circle r="58" fill="#0d1117" stroke="#30363d" stroke-width="1.5"/>
    <text y="18" font-family="Georgia, Cambria, serif" font-size="56" font-style="italic" fill="#8b949e" text-anchor="middle">vs</text>
  </g>

  <!-- MCP card: tool schema list -->
  <g transform="translate(720, 90)">
    <rect x="0" y="0" width="380" height="230" rx="14" fill="#161b22" stroke="#1f6feb" stroke-width="2"/>
    <rect x="0" y="0" width="380" height="36" rx="14" fill="#21262d"/>
    <rect x="0" y="22" width="380" height="14" fill="#21262d"/>
    <text x="24" y="24" font-family="ui-sans-serif, system-ui, sans-serif" font-size="13" fill="#8b949e">tool schema catalog</text>
    <circle cx="354" cy="18" r="4" fill="#58a6ff"/>

    <g font-family="Menlo, Consolas, 'Courier New', monospace" font-size="13">
      <g transform="translate(22, 52)">
        <rect x="0" y="0" width="336" height="28" rx="5" fill="#1f6feb" fill-opacity="0.12" stroke="#1f6feb" stroke-opacity="0.6" stroke-width="1"/>
        <text x="12" y="19" fill="#58a6ff">mail_list(top, folder, filter)</text>
      </g>
      <g transform="translate(22, 86)">
        <rect x="0" y="0" width="336" height="28" rx="5" fill="#1f6feb" fill-opacity="0.12" stroke="#1f6feb" stroke-opacity="0.6" stroke-width="1"/>
        <text x="12" y="19" fill="#58a6ff">mail_send(to, subject, body)</text>
      </g>
      <g transform="translate(22, 120)">
        <rect x="0" y="0" width="336" height="28" rx="5" fill="#1f6feb" fill-opacity="0.12" stroke="#1f6feb" stroke-opacity="0.6" stroke-width="1"/>
        <text x="12" y="19" fill="#58a6ff">calendar_events(start, end)</text>
      </g>
      <g transform="translate(22, 154)">
        <rect x="0" y="0" width="336" height="28" rx="5" fill="#1f6feb" fill-opacity="0.12" stroke="#1f6feb" stroke-opacity="0.6" stroke-width="1"/>
        <text x="12" y="19" fill="#58a6ff">chat_messages(chatId, top)</text>
      </g>
      <text x="22" y="204" fill="#6e7681" font-size="13" font-family="ui-sans-serif, system-ui, sans-serif">persistent stdio · schemas in every turn</text>
    </g>
  </g>
  <text x="910" y="370" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif" font-size="26" font-weight="700" fill="#e6edf3" text-anchor="middle" letter-spacing="2">MCP</text>
</svg>
