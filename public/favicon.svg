<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" shape-rendering="geometricPrecision">
  <style>
    :root {
      --paper: #f0ece0;
      --ink: #14233b;
      --cyan: #2a7ea8;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --paper: #003153;
        --ink: #d8e4f0;
        --cyan: #8fd0f0;
      }
    }
    .paper { fill: var(--paper); }
    .frame { fill: none; stroke: var(--ink); stroke-width: 2; }
    .marks { fill: none; stroke: var(--cyan); stroke-width: 1.3; stroke-linecap: square; }
    .letter { fill: var(--ink); }
  </style>
  <rect class="paper" width="32" height="32"/>
  <rect class="frame" x="1.5" y="1.5" width="29" height="29"/>
  <path class="marks" d="M3 7 L3 3 L7 3 M25 3 L29 3 L29 7 M29 25 L29 29 L25 29 M7 29 L3 29 L3 25"/>
  <!-- Narrower condensed-style "A" — base ~17u instead of ~20u -->
  <path class="letter" fill-rule="evenodd"
        d="M14 4 L18 4 L24.5 28 L20.5 28 L19 22.5 L13 22.5 L11.5 28 L7.5 28 Z M13.5 18.8 L18.5 18.8 L16 10.4 Z"/>
</svg>
